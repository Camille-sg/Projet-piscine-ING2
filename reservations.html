<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CampusPlay — Mes réservations</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .section-reservation {
      margin-bottom: 2rem;
    }

    .section-titre {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #1e293b;
    }

    .bloc-vide {
      color: #64748b;
      text-align: center;
      padding: 1.5rem;
      font-size: .9rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      font-size: .82rem;
      color: #475569;
      background: #f8fafc;
      padding: .75rem;
      border-bottom: 1px solid var(--bordure);
    }

    td {
      padding: .75rem;
      border-bottom: 1px solid var(--bordure);
      font-size: .88rem;
      color: #334155;
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .reservation-card-mobile {
      display: none;
    }

    @media (max-width: 760px) {
      table {
        display: none;
      }

      .reservation-card-mobile {
        display: block;
      }

      .mini-carte {
        border: 1px solid var(--bordure);
        border-radius: .75rem;
        padding: 1rem;
        margin-bottom: .75rem;
        background: white;
      }

      .mini-carte h3 {
        font-size: .95rem;
        margin-bottom: .5rem;
        color: #1e293b;
      }

      .mini-carte p {
        font-size: .84rem;
        color: #64748b;
        margin-bottom: .25rem;
      }
    }
  </style>
</head>

<body>

<script src="data.js"></script>
<script>
  if (!isConnecte()) {
    window.location.href = 'index.html';
  }

  renderNavbar('reservations');
</script>

<div class="conteneur">
  <div id="flash-zone"></div>

  <h1 style="font-size:1.8rem;font-weight:700;margin-bottom:1.5rem">
    🔖 Mes réservations
  </h1>

  <!-- SECTION RESSOURCES -->
  <section class="section-reservation">
    <h2 class="section-titre">📦 Mes réservations de ressources</h2>
    <div class="carte" id="zone-ressources"></div>
  </section>

  <!-- SECTION ÉVÉNEMENTS -->
  <section class="section-reservation">
    <h2 class="section-titre">📅 Mes événements</h2>
    <div class="carte" id="zone-evenements"></div>
  </section>
</div>

<footer style="background:white;border-top:1px solid var(--bordure);padding:1.5rem;text-align:center;color:var(--texte-doux);font-size:.85rem;margin-top:3rem">
  © 2026 CampusPlay — Tous droits réservés
</footer>

<script>
afficheFlash(document.getElementById('flash-zone'));

const user = getUser();

function badgeStatut(statut) {
  if (statut === 'approuve') {
    return '<span class="badge badge-vert">Approuvée</span>';
  }

  if (statut === 'refuse') {
    return '<span class="badge badge-rouge">Refusée</span>';
  }

  if (statut === 'annule') {
    return '<span class="badge badge-rouge">Annulée</span>';
  }

  return '<span class="badge badge-jaune">En attente</span>';
}

function dateSimple(date) {
  if (!date) return '—';
  return new Date(date).toLocaleDateString('fr-FR');
}

function afficherMesReservations() {
  const zoneRessources = document.getElementById('zone-ressources');
  const zoneEvenements = document.getElementById('zone-evenements');

  const reservations = getReservations();
  const inscriptions = getInscriptions();

  const mesReservations = reservations.filter(function(r) {
    return r.user_email === user.email;
  });

  const mesInscriptions = inscriptions.filter(function(i) {
    return i.user_email === user.email;
  });

  afficherReservationsRessources(zoneRessources, mesReservations);
  afficherEvenementsInscrits(zoneEvenements, mesInscriptions);
}

function afficherReservationsRessources(zone, liste) {
  if (!liste.length) {
    zone.innerHTML = `
      <div class="bloc-vide">
        Tu n’as aucune réservation de ressource pour le moment.
      </div>
    `;
    return;
  }

  let lignes = '';
  let cartesMobile = '';

  liste.forEach(function(r) {
    const ressource = RESSOURCES.find(function(x) {
      return x.id == r.ressource_id;
    });

    const nomRessource = ressource ? ressource.nom : (r.ressource_nom || 'Ressource');
    const statut = r.statut || 'en_attente';

    lignes += `
      <tr>
        <td><strong>${e(nomRessource)}</strong></td>
        <td>${dateSimple(r.date_debut)}</td>
        <td>${dateSimple(r.date_fin)}</td>
        <td>${e(r.quantite)}</td>
        <td>${badgeStatut(statut)}</td>
        <td>
          ${
            statut === 'refuse' || statut === 'annule'
              ? '<span style="color:#94a3b8;font-size:.82rem">Aucune action</span>'
              : `<button onclick="annulerMaReservation(${r.id})" class="btn btn-erreur" style="font-size:.8rem;padding:.35rem .7rem">
                   Annuler
                 </button>`
          }
        </td>
      </tr>
    `;

    cartesMobile += `
      <div class="mini-carte">
        <h3>${e(nomRessource)}</h3>
        <p>📅 Du ${dateSimple(r.date_debut)} au ${dateSimple(r.date_fin)}</p>
        <p>📦 Quantité : ${e(r.quantite)}</p>
        <p>Statut : ${badgeStatut(statut)}</p>
        ${
          statut === 'refuse' || statut === 'annule'
            ? ''
            : `<button onclick="annulerMaReservation(${r.id})" class="btn btn-erreur" style="width:100%;margin-top:.7rem">
                 Annuler
               </button>`
        }
      </div>
    `;
  });

  zone.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Ressource</th>
          <th>Début</th>
          <th>Fin</th>
          <th>Qté</th>
          <th>Statut</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        ${lignes}
      </tbody>
    </table>

    <div class="reservation-card-mobile">
      ${cartesMobile}
    </div>
  `;
}

function afficherEvenementsInscrits(zone, liste) {
  if (!liste.length) {
    zone.innerHTML = `
      <div class="bloc-vide">
        Tu n’es inscrite à aucun événement pour le moment.
      </div>
    `;
    return;
  }

  let lignes = '';
  let cartesMobile = '';

  liste.forEach(function(i) {
    const evenement = EVENEMENTS.find(function(x) {
      return x.id == i.evenement_id;
    });

    if (!evenement) return;

    lignes += `
      <tr>
        <td><strong>${e(evenement.titre)}</strong></td>
        <td>${formatDate(evenement.date_debut)}</td>
        <td>${e(evenement.lieu || '—')}</td>
        <td><span class="badge badge-bleu">Inscrit</span></td>
        <td>
          <button onclick="desinscrireDepuisReservations(${evenement.id})" class="btn btn-erreur" style="font-size:.8rem;padding:.35rem .7rem">
            Se désinscrire
          </button>
        </td>
      </tr>
    `;

    cartesMobile += `
      <div class="mini-carte">
        <h3>${e(evenement.titre)}</h3>
        <p>📅 ${formatDate(evenement.date_debut)}</p>
        <p>📍 ${e(evenement.lieu || '—')}</p>
        <p><span class="badge badge-bleu">Inscrit</span></p>
        <button onclick="desinscrireDepuisReservations(${evenement.id})" class="btn btn-erreur" style="width:100%;margin-top:.7rem">
          Se désinscrire
        </button>
      </div>
    `;
  });

  if (!lignes) {
    zone.innerHTML = `
      <div class="bloc-vide">
        Tu n’es inscrite à aucun événement pour le moment.
      </div>
    `;
    return;
  }

  zone.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Événement</th>
          <th>Date</th>
          <th>Lieu</th>
          <th>Statut</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        ${lignes}
      </tbody>
    </table>

    <div class="reservation-card-mobile">
      ${cartesMobile}
    </div>
  `;
}

async function annulerMaReservation(idReservation) {
  if (!confirm("Tu veux vraiment annuler cette réservation ?")) {
    return;
  }

  const reponse = await annulerReservation(idReservation);

  if (reponse.succes) {
    flash("Réservation annulée.", "succes");

    window.RESSOURCES = _sync(API + 'ressources.php');

    afficherMesReservations();
    afficheFlash(document.getElementById('flash-zone'));
  } else {
    flash(reponse.erreur || "Impossible d’annuler la réservation.", "erreur");
    afficheFlash(document.getElementById('flash-zone'));
  }
}

async function desinscrireDepuisReservations(idEvenement) {
  if (!confirm("Tu veux vraiment te désinscrire de cet événement ?")) {
    return;
  }

  const reponse = await seDesinscrire(idEvenement);

  if (reponse.succes) {
    flash("Tu es bien désinscrite de l’événement.", "succes");

    window.EVENEMENTS = _sync(API + 'evenements.php');

    afficherMesReservations();
    afficheFlash(document.getElementById('flash-zone'));
  } else {
    flash(reponse.erreur || "Impossible de se désinscrire.", "erreur");
    afficheFlash(document.getElementById('flash-zone'));
  }
}

afficherMesReservations();
</script>

</body>
</html>
