<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CampusPlay — Connexion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1e293b 0%, #312e81 100%);
      font-family: system-ui, sans-serif;
    }
    .card {
      background: white; border-radius: 1.25rem;
      padding: 2.5rem 2.25rem; width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    .logo { text-align: center; margin-bottom: 1.75rem; }
    .logo .ico { font-size: 2.75rem; }
    .logo h1 { font-size: 1.65rem; font-weight: 800; color: #1e293b; margin: .35rem 0 .2rem; }
    .logo p  { color: #64748b; font-size: .88rem; }
    .tabs { display: flex; background: #f1f5f9; border-radius: .6rem; padding: .2rem; margin-bottom: 1.5rem; }
    .tab  { flex: 1; text-align: center; padding: .45rem; border-radius: .45rem;
            cursor: pointer; font-size: .85rem; font-weight: 600; color: #64748b; transition: .15s; }
    .tab.actif { background: white; color: #4f46e5; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    label { display: block; font-size: .82rem; font-weight: 600; color: #374151; margin-bottom: .3rem; }
    input {
      width: 100%; padding: .65rem .85rem;
      border: 1.5px solid #e2e8f0; border-radius: .5rem;
      font-size: .9rem; margin-bottom: 1rem; transition: border .15s;
    }
    input:focus { outline: none; border-color: #4f46e5; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .btn-submit {
      width: 100%; padding: .75rem; background: #4f46e5; color: white;
      border: none; border-radius: .6rem; font-size: .95rem;
      font-weight: 700; cursor: pointer; transition: background .15s;
    }
    .btn-submit:hover { background: #3730a3; }
    .btn-submit:disabled { background: #a5b4fc; cursor: not-allowed; }
    .erreur {
      background: #fee2e2; color: #991b1b;
      border: 1px solid #fecaca; border-radius: .5rem;
      padding: .6rem .9rem; font-size: .85rem;
      margin-bottom: 1rem; display: none;
    }
    .hint { text-align:center; font-size:.75rem; color:#94a3b8; margin-top:1.25rem; line-height:1.6; }
    code { background:#f1f5f9; padding:.1rem .3rem; border-radius:.25rem; font-size:.78rem; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="ico">🎵</div>
    <h1>CampusPlay</h1>
    <p>La plateforme musicale de ton campus</p>
  </div>

  <div class="tabs">
    <div class="tab actif" onclick="showTab('login')">Se connecter</div>
    <div class="tab"       onclick="showTab('register')">S'inscrire</div>
  </div>

  <div class="erreur" id="err"></div>

  <!-- ── Formulaire connexion ── -->
  <form id="form-login" onsubmit="doLogin(event)">
    <label>Adresse e-mail</label>
    <input type="email" id="l-email" placeholder="prenom@exemple.fr" required autocomplete="email">
    <label>Mot de passe</label>
    <input type="password" id="l-mdp" placeholder="••••••••" required autocomplete="current-password">
    <button type="submit" class="btn-submit" id="btn-login">🔓 Se connecter</button>
  </form>

  <!-- ── Formulaire inscription ── -->
  <form id="form-register" style="display:none" onsubmit="doRegister(event)">
    <div class="grid2">
      <div><label>Prénom</label><input type="text"     id="r-prenom" placeholder="Sophie"           required></div>
      <div><label>Nom</label>   <input type="text"     id="r-nom"    placeholder="Martin"            required></div>
    </div>
    <label>Adresse e-mail</label>
    <input type="email"    id="r-email" placeholder="prenom@exemple.fr"         required>
    <label>Mot de passe <span style="font-weight:400;color:#94a3b8">(6 caractères min.)</span></label>
    <input type="password" id="r-mdp"   placeholder="Choisir un mot de passe"   required minlength="6">
    <button type="submit" class="btn-submit" id="btn-register">✨ Créer mon compte</button>
  </form>

  <p class="hint">
    Comptes démo :<br>
    <code>admin@campusplay.fr</code> / <code>admin123</code>
  </p>
</div>

<script src="data.js"></script>
<script>
function showTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) =>
    el.classList.toggle('actif', (t==='login'&&i===0)||(t==='register'&&i===1))
  );
  document.getElementById('form-login').style.display    = t==='login'    ? '' : 'none';
  document.getElementById('form-register').style.display = t==='register' ? '' : 'none';
  document.getElementById('err').style.display = 'none';
}

function setErreur(msg) {
  const z = document.getElementById('err');
  z.textContent = msg;
  z.style.display = 'block';
}

async function doLogin(ev) {
  ev.preventDefault();
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Connexion…';
  try {
    const res = await connexion(
      document.getElementById('l-email').value.trim(),
      document.getElementById('l-mdp').value
    );
    if (res.succes) { 
        localStorage.setItem('campusplay_user', JSON.stringify(res.user || res));
        window.location.href = 'accueil.html'; }
    else            { setErreur(res.erreur || 'Email ou mot de passe incorrect.'); }
  } catch(e) {
    setErreur('Impossible de joindre le serveur. Vérifie que MAMP est lancé.');
  } finally {
    btn.disabled = false; btn.textContent = '🔓 Se connecter';
  }
}

async function doRegister(ev) {
  ev.preventDefault();
  const btn = document.getElementById('btn-register');
  btn.disabled = true; btn.textContent = 'Création…';
  try {
    const res = await inscription(
      document.getElementById('r-prenom').value.trim(),
      document.getElementById('r-nom').value.trim(),
      document.getElementById('r-email').value.trim(),
      document.getElementById('r-mdp').value
    );
    if (res.succes) { window.location.href = 'accueil.html'; }
    else            { setErreur(res.erreur || "Erreur lors de l'inscription."); }
  } catch(e) {
    setErreur('Impossible de joindre le serveur. Vérifie que MAMP est lancé.');
  } finally {
    btn.disabled = false; btn.textContent = '✨ Créer mon compte';
  }
}
</script>
</body>
</html>
