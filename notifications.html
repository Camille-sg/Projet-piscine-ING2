<body>

<script src="data.js"></script>
<script>
  if (!isConnecte()) window.location.href = 'index.html';

<div class="conteneur">

  <!-- ════ HEADER ════ -->

    <div class="logo-cercle">logo</div>

    <div class="header-centre">

      <span class="user-role" id="user-role"></span>
      <button class="btn-deco" onclick="logout()">Déconnexion</button>
    </div>
  </header>

  <!-- ════ CORPS ════ -->
  <div class="site-corps">

    <!-- SIDEBAR -->
    <nav class="sidebar">
      <a href="accueil.html">
        <span class="icone">🏠</span> Accueil
      </a>
      <a href="activites.html">
        <span class="icone">🎯</span> Activités
      </a>
      <a href="evenements.html">
        <span class="icone">📅</span> Évènements
      </a>
      <a href="ressources.html">
        <span class="icone">📦</span> Ressources
      </a>
      <a href="reservations.html">
        <span class="icone">🔖</span> Réservations
      </a>

      <hr>

      <a href="notifications.html" class="actif">
        <span class="icone">🔔</span> Notifications
        <span class="badge-nb" id="badge-notif"></span>
      </a>

      <hr>

      <a href="profil.html">

      <a href="admin.html" id="lien-admin" style="display:none">
        <span class="icone">⚙️</span> Admin
      </a>
    </nav>

    <!-- CONTENU -->
    <main class="site-contenu">

      <div id="flash-zone"></div>

      <!-- HEADER PAGE -->
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem;">
        <h2 class="page-titre">🔔 Notifications</h2>

        <button onclick="toutMarquerLu()" class="btn btn-gris">
          ✓ Tout marquer comme lu
        </button>
      </div>

      <!-- FILTRES -->
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.25rem">
        <button onclick="filtrer('toutes')" class="btn btn-primaire filtre-btn" data-filtre="toutes">Toutes</button>

        <button onclick="filtrer('non-lues')" class="btn btn-gris filtre-btn" data-filtre="non-lues">
          Non lues
          <span id="badge-non-lues" style="display:none;background:#ef4444;color:white;border-radius:9999px;padding:.05rem .4rem;font-size:.72rem;font-weight:700;margin-left:.3rem"></span>
        </button>

        <button onclick="filtrer('evenements')" class="btn btn-gris filtre-btn" data-filtre="evenements">🎵 Événements</button>
        <button onclick="filtrer('reservations')" class="btn btn-gris filtre-btn" data-filtre="reservations">📦 Réservations</button>
        <button onclick="filtrer('systeme')" class="btn btn-gris filtre-btn" data-filtre="systeme">⚙️ Système</button>
      </div>

  <!-- ════ FOOTER ════ -->

</div>

<script>
afficheFlash(document.getElementById('flash-zone'));

const user = getUser();

if (user.role === 'admin' || user.role === 'manager') {
  const adminLink = document.getElementById('lien-admin');
  if (adminLink) adminLink.style.display = 'flex';
}

/* ── UI USER ── */
const rolesLabels = {
  admin:'Administrateur',
  manager:'Manager',
  membre:'Membre',
  etudiant:'Étudiant'
};

document.getElementById('user-nom').textContent =
  user.prenom + ' ' + user.nom;

document.getElementById('user-role').textContent =
  rolesLabels[user.role] || user.role;

/* ── NOTIFICATIONS ── */
function genererNotifications() {

  const sauvegardees = JSON.parse(localStorage.getItem('cp_notifs_' + user.email) || 'null');
  if (sauvegardees) return sauvegardees;

  const liste = [];
  let idx = 1;
  const now = new Date();

  const mesInscrits = getInscriptions().filter(i => i.user_email === user.email);

  /* EVENEMENTS */
  mesInscrits.forEach(i => {
    const ev = EVENEMENTS.find(x => x.id === i.evenement_id);
    if (!ev) return;

    const dateEv = new Date(ev.date_debut);
    const diffJour = Math.ceil((dateEv - now) / 86400000);

    liste.push({
      id: idx++,
      type: 'evenements',
      lue: false,
      icone: '📅',
      couleur: '#dcfce7',
      titre: 'Inscription confirmée',
      desc: `Tu es inscrit(e) à "${ev.titre}" le ${dateEv.toLocaleDateString('fr-FR')}.`,
      meta: 'Récemment',
      lien: 'evenements.html'
    });

    if (diffJour >= 0 && diffJour <= 3) {
      liste.push({
        id: idx++,
        type: 'evenements',
        lue: false,
        icone: '⏰',
        couleur: '#fef3c7',
        titre: `Rappel — ${ev.titre}`,
        desc: diffJour === 0
          ? `C’est aujourd’hui à ${dateEv.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}`
          : `Dans ${diffJour} jour(s)`,
        meta: 'Rappel automatique',
        lien: 'evenements.html'
      });
    }
  });

  /* RESERVATIONS */
  const mesRes = getReservations().filter(r => r.user_email === user.email);

  mesRes.forEach(r => {
    const res = RESSOURCES.find(x => x.id === r.ressource_id);

    liste.push({
      id: idx++,
      type: 'reservations',
      lue: false,
      icone: '📦',
      couleur: '#fef3c7',
      titre: 'Réservation',
      desc: `Statut de "${res?.nom ?? '?'}" : ${r.statut}`,
      meta: new Date(r.date_debut).toLocaleDateString('fr-FR'),
      lien: 'reservations.html'
    });
  });

  /* SYSTEME */
  liste.push(
    {
      id: idx++,
      type: 'systeme',
      lue: true,
      icone: '🎉',
      couleur: '#ede9fe',
      titre: 'Bienvenue',
      desc: `Bonjour ${user.prenom}, bienvenue sur CampusPlay.`,
      meta: 'Système',
      lien: 'accueil.html'
    }
  );

  return liste;
}

let NOTIFS = genererNotifications();
let filtreActuel = 'toutes';

/* ── AFFICHAGE ── */
function afficher() {

  const filtrées =
    filtreActuel === 'toutes'
      ? NOTIFS
      : NOTIFS.filter(n => n.type === filtreActuel);

  const zone = document.getElementById('liste-notifs');

  if (!filtrées.length) {
    zone.innerHTML = `<div class="vide-notif">Aucune notification</div>`;
    return;
  }

  zone.innerHTML = filtrées.map(n => `
    <div class="notif-item ${n.lue ? '' : 'non-lue'}" onclick="marquerLu(${n.id})">
      <div class="notif-icone" style="background:${n.couleur}">${n.icone}</div>

      <div class="notif-corps">
        <div class="notif-titre">${n.titre}</div>
        <div class="notif-desc">${n.desc}</div>
        <div class="notif-meta">${n.meta}</div>

        ${n.lien ? `<a href="${n.lien}" class="btn btn-gris">Voir</a>` : ''}
      </div>
    </div>
  `).join('');
}

/* ── ACTIONS ── */
function marquerLu(id) {
  const n = NOTIFS.find(x => x.id === id);
  if (n) n.lue = true;
  sauvegarder();
  afficher();
}

function toutMarquerLu() {
  NOTIFS.forEach(n => n.lue = true);
  sauvegarder();
  afficher();
}

function sauvegarder() {
  localStorage.setItem('cp_notifs_' + user.email, JSON.stringify(NOTIFS));
}

function filtrer(val) {
  filtreActuel = val;
  afficher();
}

window.marquerLu = marquerLu;
window.toutMarquerLu = toutMarquerLu;
window.filtrer = filtrer;

/* INIT */
afficher();
</script>

</body>
</html>
