<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CampusPlay — Événements</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script src="data.js"></script>
<script>
  if (!isConnecte()) {
    window.location.href = 'index.html';
  }
  renderNavbar('evenements');
</script>

<div class="conteneur">
  <div id="flash-zone"></div>

  <h1 style="font-size:1.8rem;font-weight:700;margin-bottom:1.5rem">
    📅 Événements
  </h1>

  <!-- Filtres -->
  <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;background:white;border:1px solid var(--bordure);border-radius:.75rem;padding:1rem">
    
    <div style="flex:1;min-width:200px">
      <input type="text" id="recherche" placeholder="🔍 Rechercher un événement…"
             style="width:100%;padding:.6rem .9rem;border:1.5px solid var(--bordure);border-radius:.5rem;font-size:.9rem">
    </div>

    <select id="filtre-activite" style="padding:.6rem .9rem;border:1.5px solid var(--bordure);border-radius:.5rem;font-size:.9rem">
      <option value="">Toutes les activités</option>
    </select>

    <select id="filtre-places" style="padding:.6rem .9rem;border:1.5px solid var(--bordure);border-radius:.5rem;font-size:.9rem">
      <option value="">Toutes les places</option>
      <option value="dispo">Places disponibles</option>
      <option value="plein">Complet</option>
    </select>

    <select id="filtre-date" style="padding:.6rem .9rem;border:1.5px solid var(--bordure);border-radius:.5rem;font-size:.9rem">
  <option value="avenir">Événements à venir</option>
  <option value="passes">Événements passés</option>
  <option value="tous">Tous les événements</option>
</select>

  </div>

  <div class="grille-3" id="liste-evenements"></div>

  <p id="aucun" style="display:none;color:#64748b;text-align:center;padding:2rem">
    Aucun événement trouvé.
  </p>
</div>

<footer style="background:white;border-top:1px solid var(--bordure);padding:1.5rem;text-align:center;color:var(--texte-doux);font-size:.85rem;margin-top:3rem">
  © 2026 CampusPlay — Tous droits réservés
</footer>

<script>
afficheFlash(document.getElementById('flash-zone'));

/* Remplir le filtre activités */
const sel = document.getElementById('filtre-activite');

ACTIVITES.forEach(a => {
  const option = document.createElement('option');
  option.value = a.id;
  option.textContent = a.titre;
  sel.appendChild(option);
});

/* Affichage des événements */
function afficher() {
const recherche = document.getElementById('recherche').value.toLowerCase();
const filtreAct = document.getElementById('filtre-activite').value;
const filtrePl  = document.getElementById('filtre-places').value;
const filtreDate = document.getElementById('filtre-date').value;
const isAdmin   = getRole() === 'admin' || getRole() === 'manager';
const mesInscriptions = getInscriptions();

const maintenant = new Date();

 const filtres = EVENEMENTS.filter(ev => {
  const dateEvent = new Date(ev.date_debut);

  if (!isAdmin && ev.statut !== 'approuve') return false;
  if (recherche && !ev.titre.toLowerCase().includes(recherche)) return false;
  if (filtreAct && ev.activite_id != parseInt(filtreAct)) return false;
  if (filtrePl === 'dispo' && ev.places_prises >= ev.places_max) return false;
  if (filtrePl === 'plein' && ev.places_prises < ev.places_max) return false;

  if (filtreDate === 'avenir' && dateEvent < maintenant) return false;
  if (filtreDate === 'passes' && dateEvent >= maintenant) return false;

  return true;
});

filtres.sort(function(a, b) {
  return new Date(a.date_debut) - new Date(b.date_debut);
});

  const conteneur = document.getElementById('liste-evenements');
  const aucun = document.getElementById('aucun');

  conteneur.innerHTML = '';

  if (!filtres.length) {
    aucun.style.display = 'block';
    return;
  }

  aucun.style.display = 'none';

  const statuts = {
    approuve: 'badge-vert',
    en_attente: 'badge-jaune',
    refuse: 'badge-rouge'
  };

  filtres.forEach(ev => {
    const activite = ACTIVITES.find(a => a.id == ev.activite_id);

    const actTitre = ev.activite_titre || (activite ? activite.titre : '—');
    const actCouleur = ev.activite_couleur || (activite ? activite.couleur : '#6366f1');

    const plein = ev.places_prises >= ev.places_max;
    const inscriptionUser = mesInscriptions.find(i => i.evenement_id == ev.id);
const dejaInscrit = inscriptionUser && inscriptionUser.statut === 'inscrit';
const enAttente = inscriptionUser && inscriptionUser.statut === 'liste_attente';
    const placesRestantes = ev.places_max - ev.places_prises;

    conteneur.innerHTML += `
      <div class="carte" style="height:100%">
        <div style="background:${actCouleur};height:5px;border-radius:4px 4px 0 0;margin:-1.5rem -1.5rem 1rem"></div>

        <div style="display:flex;gap:.5rem;margin-bottom:.75rem;flex-wrap:wrap">
          <span class="badge ${plein ? 'badge-rouge' : 'badge-vert'}">
            ${plein ? 'Complet' : placesRestantes + ' place' + (placesRestantes > 1 ? 's' : '')}
          </span>

          ${isAdmin ? `<span class="badge ${statuts[ev.statut] || 'badge-jaune'}">${e(ev.statut.replace('_',' '))}</span>` : ''}

         ${dejaInscrit ? `<span class="badge badge-bleu">Déjà inscrit</span>` : ''}
${enAttente ? `<span class="badge badge-jaune">Liste d’attente</span>` : ''}
        </div>

        <h3 style="font-size:1rem;font-weight:700;margin-bottom:.5rem;color:#1e293b">
          ${e(ev.titre)}
        </h3>

        <p style="font-size:.82rem;color:#64748b;margin-bottom:.2rem">
          📅 ${formatDate(ev.date_debut)}
        </p>

        <p style="font-size:.82rem;color:#64748b;margin-bottom:.2rem">
          📍 ${e(ev.lieu || 'Lieu non précisé')}
        </p>

        <p style="font-size:.82rem;color:#94a3b8;margin-bottom:1rem">
          🎯 ${e(actTitre)}
        </p>

        ${
  dejaInscrit
    ? `<button onclick="desinscrireEvenement(${ev.id})" class="btn btn-erreur" style="width:100%">
         Se désinscrire
       </button>`
    : enAttente
      ? `<button onclick="desinscrireEvenement(${ev.id})" class="btn btn-erreur" style="width:100%">
           Quitter la liste d’attente
         </button>`
      : plein
        ? `<button onclick="inscrireEvenement(${ev.id})" class="btn btn-gris" style="width:100%">
             Rejoindre la liste d’attente
           </button>`
        : `<button onclick="inscrireEvenement(${ev.id})" class="btn btn-primaire" style="width:100%">
             S'inscrire
           </button>`
}
      </div>
    `;
  });
}

/* Inscription à un événement */
async function inscrireEvenement(idEvenement) {
  if (!isConnecte()) {
    flash("Tu dois être connecté(e) pour t'inscrire.", "erreur");
    window.location.href = "index.html";
    return;
  }

  const reponse = await sInscrireEvenement(idEvenement);

  if (reponse.succes) {
  flash(reponse.message || "Inscription enregistrée.", "succes");

  window.EVENEMENTS = _sync(API + 'evenements.php');

  afficher();
  afficheFlash(document.getElementById('flash-zone'));
} else {
    flash(reponse.erreur || "Impossible de s'inscrire à cet événement.", "erreur");
    afficher();
    afficheFlash(document.getElementById('flash-zone'));
  }
}

/* Désinscription d'un événement */
async function desinscrireEvenement(idEvenement) {
  if (!confirm("Tu veux vraiment te désinscrire de cet événement ?")) {
    return;
  }

  const reponse = await seDesinscrire(idEvenement);

  if (reponse.succes) {
    flash("Tu es bien désinscrit(e) de l'événement.", "succes");

    /* Recharge les événements depuis la base */
    window.EVENEMENTS = _sync(API + 'evenements.php');

    afficher();
    afficheFlash(document.getElementById('flash-zone'));
  } else {
    flash(reponse.erreur || "Impossible de se désinscrire.", "erreur");
    afficher();
    afficheFlash(document.getElementById('flash-zone'));
  }
}

/* Événements des filtres */
document.getElementById('recherche').addEventListener('input', afficher);
document.getElementById('filtre-activite').addEventListener('change', afficher);
document.getElementById('filtre-places').addEventListener('change', afficher);
document.getElementById('filtre-date').addEventListener('change', afficher);

/* Initialisation */
afficher();
</script>

</body>
</html>
