<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CampusPlay — Inscription</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page-inscription">
  <div class="carte-inscription">

    <!-- Bandeau -->
    <div class="bandeau-inscription">
      <h1>Campus<span>Play</span></h1>
      <p>Création de compte utilisateur ♪</p>
    </div>

    <!-- Corps -->
    <div class="corps-inscription">

      <div class="message-inscription erreur-inscription" id="message-erreur"></div>
      <div class="message-inscription succes-inscription" id="message-succes"></div>

      <form id="form-inscription" action="inscription.php" method="POST">

        <div class="champ-inscription">
  <label for="nom">Nom</label>
  <input type="text" id="nom" name="nom" placeholder="Ex : Dupont" required>
</div>

<div class="champ-inscription">
  <label for="prenom">Prénom</label>
  <input type="text" id="prenom" name="prenom" placeholder="Ex : Emma" required>
</div>

<div class="champ-inscription">
  <label for="email">Adresse email</label>
  <input type="email" id="email" name="email" placeholder="prenom.nom@campus.fr" required>
</div>

<div class="champ-inscription">
  <label for="mdp">Mot de passe</label>
  <input type="password" id="mdp" name="mdp" placeholder="Minimum 6 caractères" required>
</div>

        <button type="submit" class="btn-inscription">
          Créer mon compte
        </button>

      </form>

      <div class="lien-bas-inscription">
        Déjà un compte ?
        <a href="index.html">Se connecter</a>
      </div>

    </div>

    <!-- Pied -->
    <div class="pied-inscription">
      <div><strong>Copyright</strong> © 2026 CampusPlay</div>
      <div>contact@campusplay.fr</div>
    </div>

  </div>
</div>



</body>
</html>
