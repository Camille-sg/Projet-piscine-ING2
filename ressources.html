<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CampusPlay — Ressources</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<script src="data.js"></script>
<script>renderNavbar('ressources');</script>

<div class="conteneur">

  <div class="site-corps">

    <!-- SIDEBAR -->
    <aside class="sidebar"></aside>

    <!-- CONTENU -->
    <main class="site-contenu">

      <div id="flash-zone"></div>

      <h1 class="page-titre">📦 Ressources disponibles</h1>

      <!-- FILTRES (uniformisés design system) -->
      <div class="carte" style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center;margin-bottom:1.5rem">

        <input
          type="text"
          id="recherche"
          placeholder="🔍 Rechercher une ressource…"
          style="flex:1;min-width:200px"
          oninput="filtrer()"
        >

        <select id="filtre-categorie" onchange="filtrer()">
          <option value="">Toutes les catégories</option>
        </select>

        <select id="filtre-dispo" onchange="filtrer()">
          <option value="">Toutes</option>
          <option value="dispo">Disponibles uniquement</option>
          <option value="epuise">Épuisées</option>
        </select>

        <button onclick="reinitialiser()" class="btn btn-gris">
          ✕ Réinitialiser
        </button>

      </div>

      <div id="compteur" style="font-size:.85rem;color:var(--texte-doux);margin-bottom:1rem"></div>

      <!-- GRILLE DESIGN SYSTEM -->
      <div class="grille-3" id="liste-ressources"></div>

      <h2 class="page-titre" id="titre-mes-res" style="display:none;margin-top:2rem">
        Mes réservations
      </h2>

      <div class="carte" id="table-mes-res" style="display:none"></div>

    </main>
  </div>

  <!-- FOOTER IDENTIQUE DESIGN SYSTEM -->
  <footer class="site-footer">
    © 2026 CampusPlay — Tous droits réservés
  </footer>

</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-bg">
  <div class="modal-boite">

    <div class="modal-entete">
      <h2 id="modal-titre">Réserver</h2>
      <button class="modal-fermer" onclick="fermerModal()">✕</button>
    </div>

    <div class="modal-contenu">
      <form id="form-reservation">

        <div class="form-groupe">
          <label>Date de début *</label>
          <input type="date" id="res-debut" required>
        </div>

        <div class="form-groupe">
          <label>Date de fin *</label>
          <input type="date" id="res-fin" required>
        </div>

        <div class="form-groupe">
          <label>Quantité *</label>
          <input type="number" id="res-qte" min="1" value="1" required>
        </div>

        <button type="submit" id="btn-reserver" class="btn btn-primaire btn-plein">
          Confirmer la réservation
        </button>

      </form>
    </div>

  </div>
</div>

<script>
afficheFlash(document.getElementById('flash-zone'));

let ressourceSelectee = null;
let mesReservations = [];

/* ── catégories ── */
let categories = [];
RESSOURCES.forEach(r => {
  if (r.categorie && !categories.includes(r.categorie)) categories.push(r.categorie);
});
categories.sort();

const sel = document.getElementById('filtre-categorie');
categories.forEach(cat => {
  const o = document.createElement('option');
  o.value = cat;
  o.textContent = cat;
  sel.appendChild(o);
});

/* ── filtre ── */
function filtrer() {
  const texte = document.getElementById('recherche').value.toLowerCase().trim();
  const cat   = document.getElementById('filtre-categorie').value;
  const dispo = document.getElementById('filtre-dispo').value;

  const resultats = RESSOURCES.filter(r => {
    const matchTexte =
      !texte ||
      r.nom.toLowerCase().includes(texte) ||
      (r.description || '').toLowerCase().includes(texte);

    const matchCat = !cat || r.categorie === cat;

    const matchDispo =
      !dispo ||
      (dispo === 'dispo' && r.quantite_disponible > 0) ||
      (dispo === 'epuise' && r.quantite_disponible <= 0);

    return matchTexte && matchCat && matchDispo;
  });

  afficherRessources(resultats);
}

function reinitialiser() {
  document.getElementById('recherche').value = '';
  document.getElementById('filtre-categorie').value = '';
  document.getElementById('filtre-dispo').value = '';
  afficherRessources(RESSOURCES);
}

/* ── affichage cartes (harmonisé avec design system) ── */
function afficherRessources(liste) {

  const zone = document.getElementById('liste-ressources');
  const cpt  = document.getElementById('compteur');

  cpt.textContent =
    liste.length + ' ressource' + (liste.length > 1 ? 's' : '') + ' trouvée' + (liste.length > 1 ? 's' : '');

  zone.innerHTML = liste.map(res => {

    const pct = res.quantite_totale > 0
      ? Math.round(res.quantite_disponible / res.quantite_totale * 100)
      : 0;

    const dispo = res.quantite_disponible > 0;

    return `
      <div class="carte">

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
          <span class="badge badge-bleu">${e(res.categorie || 'Autre')}</span>
          <span class="badge ${dispo ? 'badge-vert' : 'badge-rouge'}">
            ${dispo ? 'Disponible' : 'Épuisé'}
          </span>
        </div>

        <h3 style="font-weight:800;margin-bottom:.4rem">${e(res.nom)}</h3>

        <p style="font-size:.85rem;color:var(--texte-doux);margin-bottom:1rem">
          ${e(res.description || '')}
        </p>

        <div style="display:flex;justify-content:space-between;font-size:.8rem;color:var(--texte-doux)">
          <span>${res.quantite_disponible}/${res.quantite_totale}</span>
          <span>${pct}%</span>
        </div>

        <div style="background:var(--beige-bord);height:8px;border-radius:9999px;margin:.6rem 0;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${pct > 50 ? 'var(--succes)' : pct > 0 ? 'var(--attention)' : 'var(--erreur)'}"></div>
        </div>

        ${
          dispo
            ? `<button onclick="ouvrirModal(${res.id})" class="btn btn-primaire btn-plein">Réserver</button>`
            : `<button class="btn btn-gris btn-plein" disabled>Indisponible</button>`
        }

      </div>
    `;
  }).join('');
}

/* ── modal ── */
function ouvrirModal(id) {
  if (!isConnecte()) {
    flash('Connexion requise.', 'attention');
    window.location.href = 'connexion.html';
    return;
  }

  ressourceSelectee = id;
  const res = RESSOURCES.find(r => r.id == id);

  document.getElementById('modal-titre').textContent = 'Réserver : ' + res.nom;
  document.getElementById('modal-overlay').classList.add('ouvert');
}

function fermerModal() {
  document.getElementById('modal-overlay').classList.remove('ouvert');
}

window.ouvrirModal = ouvrirModal;
window.fermerModal = fermerModal;

afficherRessources(RESSOURCES);
</script>

</body>
</html>
