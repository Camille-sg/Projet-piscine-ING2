<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CampusPlay — Activités</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script src="data.js"></script>
<script>renderNavbar('activites');</script>

<div class="conteneur">

  <h1 style="font-size:1.8rem;font-weight:700;margin-bottom:1.5rem">🎯 Activités</h1>

  <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;background:white;border:1px solid var(--bordure);border-radius:.75rem;padding:1rem">
    <input type="text" id="recherche" placeholder="🔍 Rechercher…"
           style="flex:1;min-width:180px;padding:.6rem .9rem;border:1.5px solid var(--bordure);border-radius:.5rem;font-size:.9rem">
    <select id="filtre-cat" style="padding:.6rem .9rem;border:1.5px solid var(--bordure);border-radius:.5rem;font-size:.9rem">
      <option value="">Toutes catégories</option>
    </select>
    <select id="filtre-diff" style="padding:.6rem .9rem;border:1.5px solid var(--bordure);border-radius:.5rem;font-size:.9rem">
      <option value="">Toutes difficultés</option>
      <option value="facile">Facile</option>
      <option value="moyen">Moyen</option>
      <option value="difficile">Difficile</option>
    </select>
  </div>

  <div class="grille-3" id="liste"></div>
</div>

<footer style="background:white;border-top:1px solid var(--bordure);padding:1.5rem;text-align:center;color:var(--texte-doux);font-size:.85rem;margin-top:3rem">
  © 2026 CampusPlay — Tous droits réservés
</footer>

<script>
// Remplir le filtre catégories dynamiquement depuis la BDD
const cats = [...new Set(ACTIVITES.map(a => a.categorie).filter(Boolean))];
const selCat = document.getElementById('filtre-cat');
cats.forEach(c => {
  const o = document.createElement('option');
  o.value = c; o.textContent = c;
  selCat.appendChild(o);
});

function afficher() {
  const rech = document.getElementById('recherche').value.toLowerCase();
  const cat  = document.getElementById('filtre-cat').value;
  const diff = document.getElementById('filtre-diff').value;

  const filtres = ACTIVITES.filter(a =>
    (!rech || a.titre.toLowerCase().includes(rech) || (a.description||'').toLowerCase().includes(rech)) &&
    (!cat  || a.categorie === cat) &&
    (!diff || a.difficulte === diff)
  );

  const diff_badges = { facile:'badge-vert', moyen:'badge-jaune', difficile:'badge-rouge' };

  document.getElementById('liste').innerHTML = filtres.map(a => {
    // Comparaison souple == pour éviter les problèmes int/string
    const nb_ev = EVENEMENTS.filter(ev => ev.activite_id == a.id && ev.statut === 'approuve').length;
    return `
      <div class="carte">
        <div style="background:${a.couleur||'#6366f1'};height:5px;border-radius:4px 4px 0 0;margin:-1.5rem -1.5rem 1rem"></div>
        <div style="display:flex;gap:.5rem;margin-bottom:.75rem;flex-wrap:wrap">
          <span class="badge badge-bleu">${e(a.categorie)}</span>
          <span class="badge ${diff_badges[a.difficulte]||'badge-jaune'}">${e(a.difficulte)}</span>
        </div>
        <h3 style="font-size:1rem;font-weight:700;margin-bottom:.5rem">${e(a.titre)}</h3>
        <p style="font-size:.85rem;color:#64748b;margin-bottom:1rem;line-height:1.5">${e(a.description)}</p>
        <p style="font-size:.82rem;color:#4f46e5;font-weight:600">${nb_ev} événement${nb_ev > 1 ? 's' : ''} à venir</p>
        <a href="evenements.html" class="btn btn-contour" style="margin-top:.75rem;font-size:.85rem;display:inline-block">Voir les événements</a>
      </div>`;
  }).join('');
}

document.getElementById('recherche').addEventListener('input', afficher);
document.getElementById('filtre-cat').addEventListener('change', afficher);
document.getElementById('filtre-diff').addEventListener('change', afficher);
afficher();
</script>

</body>
</html>
